data:
  root_dir: ./Simulator/results/2026_04_06_01_53_20/simulated_hologram/holo_0.tiff
  blurring:
    activ: false
    blur_epochs: 2000
    max_sigma: 1.0
    min_sigma: 0.1
    kernel_size: 9
optim:
  algo: Adam
  params:
    lr: 0.0005
    eps: 1.0e-07
    betas:
    - 0.9
    - 0.95
  lr_physics: 0.005
  scheduler:
    activ: false
    milestones:
    - 3000
    gamma: 0.1
    warm_start: false
  stop_criteria:
    activ: false
    patience: 3
    interval: 200
    delta: 0.0001
nepochs: 20000
model:
  class: HoloSolver
  regularization:
    with_bc: true
    with_sparsity: false
    sparsity_weight: 2.0e-05
    with_tv: false
    tv_weight: 0.0005
  physical_params:
    phase_shift: 0.0714
    physicalLength: 0.1375
    step_z: 0.5
    waveLength: 0.66
    z_max: 50.0
  nerf_params:
    model: MorpHoloNet
    gaussian_proj: 64
    gaussian_scale: 10
    barf: false
    barf_epochs: 1000
  vram_params:
    activ: true
    chunk_size: 15000000
    checkpoint: true
  pre_training:
    activ: true
    epochs: 300
    targets:
    - x0: 498.0
      y0: 152.0
      z0: 16.5
      r: 6.76
    - x0: 313.0
      y0: 475.0
      z0: 5.0
      r: 6.3
    - x0: 255.0
      y0: 503.0
      z0: 37.5
      r: 6.67
    - x0: 404.0
      y0: 241.0
      z0: 38.5
      r: 4.32
test:
  save_dir: ./Results
  weights_path: ./logs/HoloSolver_70/best_model.pt
logging:
  logdir: ./logs
